name: Stop VM

on:
  schedule:
    - cron: '0 0 * * *'
  repository_dispatch:
    types: [stop]
  workflow_dispatch:

jobs:
  stop-vm:
    runs-on: ubuntu-latest
    if: vars.RUN_STOP == 'true'
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v4
        with:
          node-version-file: .node-version
      - name: Send mail
        uses: dawidd6/action-send-mail@v3
        if: vars.NOTIFY_STOP == 'true'
        with:
          server_address: smtp.gmail.com
          server_port: 465
          username: ${{ secrets.MAIL_USERNAME }}
          password: ${{ secrets.MAIL_PASSWORD }}
          from: ${{ secrets.MAIL_FROM }}
          to: ${{ secrets.MAIL_TO }}
          subject: ${{ vars.MAIL_SUBJECT }}
          body: ${{ vars.MAIL_BODY }}
          html_body: ${{ vars.MAIL_BODY }}
          convert_markdown: true
          priority: high
      - name: Sleep for 30m
        uses: juliangruber/sleep-action@v2
        with:
          time: 30m
      - name: Login to Azure
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}
      - uses: actions/checkout@v4
      - run: |
          gh variable list
          gh variable set TEST_VAR --body "Set from workflow"
          gh variable list
      - name: Stop virtual machine
        uses: azure/cli@v2
        with:
          azcliversion: 2.30.0
          inlineScript: |
            az vm stop --resource-group ${{ vars.AZURE_RESOURCE_GROUP }} --name ${{ vars.AZURE_VM }}
            az vm deallocate --resource-group ${{ vars.AZURE_RESOURCE_GROUP }} --name ${{ vars.AZURE_VM }}
      - run: |
          gh variable list
          gh variable set TEST_VAR --body "Set from workflow"
          gh variable list
